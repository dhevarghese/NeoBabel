wandb:
  entity: NeoBabel
  project: neobabel-o-training-gemma-6-languages
  resume: 'auto'

experiment:
    project: "training-gemma-6-languages-stage1"
    name: "training-gemma-6-languages-stage1_run1"
    output_dir: "gemma-training-stage1"
    max_train_examples_t2i: 40000000
    max_train_examples_mmu: 40000000
    save_every: 10000
    eval_every: 2500
    generate_every: 1000
    log_every: 50
    log_grad_norm_every: 500
    resume_from_checkpoint: 'latest'

model:
    vq_model:
        type: "magvitv2"
        vq_model_name: "showlab/magvitv2"

    neobabel:
        load_from_neobabel: False
        pretrained_model_path: "google/gemma-2-2b-it"
        vocab_size: 264203
        llm_vocab_size: 256000
        llm_model_path: 'google/gemma-2-2b-it'
        codebook_size: 8192
        num_vq_tokens: 256
        num_new_special_tokens: 10  # <|soi|> <|eoi|> <|sov|> <|eov|> <|t2i|> <|mmu|> <|t2v|> <|v2v|> <|lvg|> <|pad|>

    gradient_checkpointing: True

dataset:
    gen_type: "imagenet1k"
    und_type: "captioning"
    combined_loader_mode: "max_size_cycle"
    params:
        train_t2i_shards_path_or_url: "/home/dheerajvarghese/ImageNet_train"
        train_mmu_shards_path_or_url: []
        train_lm_shards_path_or_url: ""
        add_caption_prompt: True
        external_caption_path: ""
        external_journeydb_caption_path: ""
        external_laion12m_caption_path: ""
        external_cc12m_caption_path: ""
        validation_prompts_file: "validation_prompts/imagenetpromptsmultilingual6.txt"
        shuffle_buffer_size: 1000
        num_workers: 32
        resolution: 256
        pin_memory: True
        persistent_workers: True

    preprocessing:
        max_seq_length: 128 # for text tokens
        resolution: 256
        center_crop: False
        random_flip: False

optimizer:
    name: adamw
    params: # default adamw params
        learning_rate: 1e-4
        scale_lr: False # scale learning rate by total batch size
        beta1: 0.9
        beta2: 0.999
        weight_decay: 0.01
        epsilon: 1e-8

lr_scheduler:
    scheduler: "cosine"
    params:
        learning_rate: ${optimizer.params.learning_rate}
        warmup_steps: 5000

training:
    gradient_accumulation_steps: 18
    batch_size_t2i: 8
    batch_size_lm: 0
    batch_size_mmu: 0
    mixed_precision: "bf16"
    enable_tf32: True
    seed: 10086
    max_train_steps: 500000
    overfit_one_batch: False
    cond_dropout_prob: 0.1
    min_masking_rate: 0.0
    label_smoothing: 0.0
    max_grad_norm: null
    guidance_scale: 0.0
    generation_timesteps: 50
    t2i_coeff: 1.0
    lm_coeff: 0.1
    mmu_coeff: 1.0
