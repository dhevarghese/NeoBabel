wandb:
  entity: Neobabel
  resume: 'auto'

experiment:
    project: "Neobabel-evals"
    name: "neobabel-gen-eval"
    metadata_file: "prompts/evaluation_metadata.jsonl" # relative to benchmarking/geneval/ # Change according to the language
    output_dir: "GenEvals/neobabel-gen-eval" # Change output dir 
    

model:
    vq_model:
        type: "magvitv2"
        vq_model_name: "showlab/magvitv2"

    neobabel:
        load_from_neobabel: False 
        pretrained_model_path: "google/gemma-2-2b-it" # TODO: update to the public NeoBabel HF repo once weights are published (currently private at Dheerraa/NeoBabel)
        checkpoint_path: "training-gemma-6-languages-stage2-lumi-bs-6x1152-iter-160000/checkpoint-160000"
        vocab_size: 264203
        llm_vocab_size: 256000
        llm_model_path: 'google/gemma-2-2b-it'
        codebook_size: 8192
        num_vq_tokens: 256
        num_new_special_tokens: 10  # <|soi|> <|eoi|> <|sov|> <|eov|> <|t2i|> <|mmu|> <|t2v|> <|v2v|> <|lvg|> <|pad|>

    gradient_checkpointing: True

dataset:
    preprocessing:
        max_seq_length: 512 # for text tokens
        resolution: 256
        center_crop: False
        random_flip: False

training:
    batch_size: 4
    seed: 10086
    cond_dropout_prob: 0.1
    guidance_scale: 5.0
    generation_timesteps: 12