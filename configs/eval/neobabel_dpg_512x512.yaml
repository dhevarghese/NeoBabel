wandb:
  entity: Neobabel
  resume: 'auto'

experiment:
    project: "Neobabel-evals"
    name: "neobabel-dpg"
    metadata_file: "dpg_prompts/chinese-prompts" # Change according to the language
    output_dir: "dpg/neobabel-dpg-chinese" # Change output dir 
    

model:
    vq_model:
        type: "magvitv2"
        vq_model_name: "showlab/magvitv2"

    neobabel:
        load_from_neobabel: False 
        checkpoint_path: "NeoBabel/checkpoint-500000"
        pretrained_model_path: "google/gemma-2-2b-it"
        llm_model_path: 'google/gemma-2-2b-it'
        vocab_size: 264203
        llm_vocab_size: 256000
        codebook_size: 8192
        num_vq_tokens: 1024
        num_new_special_tokens: 10  # <|soi|> <|eoi|> <|sov|> <|eov|> <|t2i|> <|mmu|> <|t2v|> <|v2v|> <|lvg|> <|pad|>

    gradient_checkpointing: True

dataset:
    preprocessing:
        max_seq_length: 512 # for text tokens
        resolution: 512
        center_crop: False
        random_flip: False

training:
    batch_size: 1
    seed: 123456
    cond_dropout_prob: 0.1
    guidance_scale: 5
    generation_timesteps: 50