wandb:
  entity: Neobabel
  resume: 'auto'

experiment:
    project: "Neobabel-evals"
    name: "neobabel-demo"
    output_dir: "neobabel-demo"
    
model:
    vq_model:
        type: "magvitv2"
        vq_model_name: "showlab/magvitv2"

    neobabel:
        checkpoint_path: "/users/derakhsh/project/NeoBabel/training-gemma-6-languages-stage2-lumi-bs-6x1152-iter-160000/checkpoint-160000"
        load_from_neobabel: False
        pretrained_model_path: "google/gemma-2-2b-it" # TODO: update to the public NeoBabel HF repo once weights are published (currently private at Dheerraa/NeoBabel)
        llm_model_path: 'google/gemma-2-2b-it'
        vocab_size: 264203
        llm_vocab_size: 256000
        codebook_size: 8192
        num_vq_tokens: 256
        num_new_special_tokens: 10  # <|soi|> <|eoi|> <|sov|> <|eov|> <|t2i|> <|mmu|> <|t2v|> <|v2v|> <|lvg|> <|pad|>

    gradient_checkpointing: True

dataset:
    gen_type: "t2i"
    und_type: "captioning"
    params:
        batch_size: ${training.batch_size}
        shuffle_buffer_size: 1000
        num_workers: 32
        resolution: 256
        pin_memory: True
        persistent_workers: True
        validation_prompts_file: "validation_prompts/neobablprompts.txt"

    preprocessing:
        max_seq_length: 512 # for text tokens
        resolution: 256
        center_crop: False
        random_flip: False


training:
    gradient_accumulation_steps: 1
    batch_size: 4
    seed: 42
    cond_dropout_prob: 0.1
    guidance_scale: 0
    generation_timesteps: 12